<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧建築評估計分工具</title>
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #1c2333;
    --bg4: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #6e7681;
    --accent: #58a6ff;
    --accent2: #1f6feb;
    --green: #3fb950;
    --yellow: #d29922;
    --orange: #e3722a;
    --blue: #388bfd;
    --purple: #bc8cff;
    --diamond: #a5f3fc;
    --gold: #fbbf24;
    --silver: #94a3b8;
    --copper: #b87333;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header h1 span { color: var(--accent); }

  /* iOS-style version toggle */
  .version-toggle {
    display: flex;
    background: var(--bg4);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px;
    gap: 2px;
  }
  .version-btn {
    padding: 6px 20px;
    border-radius: 16px;
    border: none;
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .version-btn.active {
    background: var(--accent2);
    color: #fff;
    box-shadow: 0 1px 6px rgba(31,111,235,0.4);
  }

  /* Building type toggle (2016 only) */
  .type-bar {
    display: none;
    margin-top: 10px;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .type-bar.visible { display: flex; }
  .type-label { font-size: 12px; color: var(--text2); }
  .type-toggle {
    display: flex;
    background: var(--bg4);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2px;
    gap: 2px;
  }
  .type-btn {
    padding: 4px 14px;
    border-radius: 12px;
    border: none;
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .type-btn.active {
    background: var(--bg3);
    color: var(--text);
    border: 1px solid var(--border);
  }

  /* ===== SCORE PANEL ===== */
  .score-panel {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 16px;
    align-items: center;
    padding: 16px 20px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: var(--header-height, 0);
    z-index: 99;
  }
  .score-circle {
    position: relative;
    width: 100px;
    height: 100px;
    flex-shrink: 0;
  }
  .score-circle svg { transform: rotate(-90deg); }
  .score-circle-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .score-num { font-size: 26px; font-weight: 700; color: var(--text); }
  .score-max { font-size: 11px; color: var(--text3); }
  .score-info { flex: 1; }
  .level-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .level-diamond { background: rgba(165,243,252,0.15); color: var(--diamond); border: 1px solid var(--diamond); }
  .level-gold { background: rgba(251,191,36,0.15); color: var(--gold); border: 1px solid var(--gold); }
  .level-silver { background: rgba(148,163,184,0.15); color: var(--silver); border: 1px solid var(--silver); }
  .level-copper { background: rgba(184,115,51,0.15); color: var(--copper); border: 1px solid var(--copper); }
  .level-pass { background: rgba(63,185,80,0.15); color: var(--green); border: 1px solid var(--green); }
  .level-none { background: rgba(139,148,158,0.15); color: var(--text2); border: 1px solid var(--border); }

  .next-level { font-size: 12px; color: var(--text2); }
  .next-level span { color: var(--accent); font-weight: 600; }

  /* Progress bars per indicator */
  .ind-bars { display: flex; flex-direction: column; gap: 4px; min-width: 200px; }
  .ind-bar-row { display: flex; align-items: center; gap: 6px; }
  .ind-bar-label { font-size: 10px; color: var(--text3); width: 65px; text-align: right; flex-shrink: 0; }
  .ind-bar-track {
    flex: 1;
    height: 5px;
    background: var(--bg4);
    border-radius: 3px;
    overflow: hidden;
  }
  .ind-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: var(--accent);
    transition: width 0.3s ease;
  }
  .ind-bar-score { font-size: 10px; color: var(--text2); width: 30px; text-align: right; flex-shrink: 0; }

  /* Level thresholds display */
  .threshold-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 8px 0 0;
    grid-column: 1 / -1;
  }
  .threshold-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    flex-shrink: 0;
    opacity: 0.6;
  }
  .threshold-chip.reached { opacity: 1; }
  .t-pass { background: rgba(63,185,80,0.1); color: var(--green); border: 1px solid var(--green); }
  .t-copper { background: rgba(184,115,51,0.1); color: var(--copper); border: 1px solid var(--copper); }
  .t-silver { background: rgba(148,163,184,0.1); color: var(--silver); border: 1px solid var(--silver); }
  .t-gold { background: rgba(251,191,36,0.1); color: var(--gold); border: 1px solid var(--gold); }
  .t-diamond { background: rgba(165,243,252,0.1); color: var(--diamond); border: 1px solid var(--diamond); }

  /* ===== CONTENT ===== */
  .content { padding: 16px 20px; max-width: 1100px; margin: 0 auto; }

  .indicator-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .indicator-header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    cursor: pointer;
    gap: 10px;
    user-select: none;
    transition: background 0.15s;
  }
  .indicator-header:hover { background: var(--bg3); }
  .ind-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .ind-title { flex: 1; font-weight: 600; font-size: 14px; }
  .ind-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .ind-score-badge {
    font-size: 13px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 12px;
    background: var(--bg4);
    color: var(--accent);
    flex-shrink: 0;
  }
  .chevron { color: var(--text3); transition: transform 0.2s; flex-shrink: 0; }
  .chevron.open { transform: rotate(90deg); }

  .indicator-body {
    border-top: 1px solid var(--border);
    padding: 0;
    display: none;
  }
  .indicator-body.open { display: block; }

  /* Sub-categories */
  .subcat {
    border-bottom: 1px solid var(--bg3);
  }
  .subcat:last-child { border-bottom: none; }
  .subcat-header {
    padding: 8px 16px;
    background: var(--bg3);
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .subcat-score { color: var(--accent); }

  /* Score items */
  .score-item {
    display: flex;
    align-items: flex-start;
    padding: 8px 16px;
    gap: 10px;
    border-bottom: 1px solid var(--bg3);
    transition: background 0.1s;
  }
  .score-item:hover { background: rgba(88,166,255,0.04); }
  .score-item:last-child { border-bottom: none; }

  .item-controls { flex-shrink: 0; padding-top: 1px; }

  /* Checkbox items */
  .score-item input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
    margin-top: 2px;
  }

  /* Radio-based tiered items */
  .tier-group {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }
  .tier-btn {
    padding: 2px 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg4);
    color: var(--text2);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tier-btn:hover { border-color: var(--accent); color: var(--text); }
  .tier-btn.selected { background: var(--accent2); color: #fff; border-color: var(--accent); }
  .tier-btn.tier-0 { opacity: 0.6; }

  .item-content { flex: 1; }
  .item-label { font-size: 13px; color: var(--text); }
  .item-note { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .item-pts {
    flex-shrink: 0;
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    padding-top: 2px;
    min-width: 36px;
    text-align: right;
  }
  .item-pts.active { color: var(--green); }

  /* Toolbar buttons */
  .toolbar {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 8px 0 4px;
  }
  .reset-btn {
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg4);
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: var(--text); color: var(--text); }
  .select-all-btn {
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .select-all-btn:hover { border-color: var(--accent); color: var(--accent); }
  .select-all-btn.active {
    border-color: var(--accent);
    background: rgba(88,166,255,0.15);
    color: var(--accent);
  }

  /* Color codes per indicator */
  .c1 { background: rgba(56,139,253,0.15); }
  .c2 { background: rgba(188,111,255,0.15); }
  .c3 { background: rgba(63,185,80,0.15); }
  .c4 { background: rgba(227,114,42,0.15); }
  .c5 { background: rgba(218,54,51,0.15); }
  .c6 { background: rgba(209,213,30,0.15); }
  .c7 { background: rgba(58,212,212,0.15); }
  .c8 { background: rgba(255,150,80,0.15); }

  .ci1 { color: #58a6ff; }
  .ci2 { color: #bc8cff; }
  .ci3 { color: #3fb950; }
  .ci4 { color: #e3722a; }
  .ci5 { color: #da3633; }
  .ci6 { color: #d1d51e; }
  .ci7 { color: #3ad4d4; }
  .ci8 { color: #ff9650; }

  .bar-c1 .ind-bar-fill { background: #58a6ff; }
  .bar-c2 .ind-bar-fill { background: #bc8cff; }
  .bar-c3 .ind-bar-fill { background: #3fb950; }
  .bar-c4 .ind-bar-fill { background: #e3722a; }
  .bar-c5 .ind-bar-fill { background: #da3633; }
  .bar-c6 .ind-bar-fill { background: #d1d51e; }
  .bar-c7 .ind-bar-fill { background: #3ad4d4; }
  .bar-c8 .ind-bar-fill { background: #ff9650; }

  /* NA indicator */
  .na-chip {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    background: var(--bg4);
    color: var(--text3);
    font-size: 10px;
    margin-left: 4px;
  }

  @media (max-width: 600px) {
    .score-panel { grid-template-columns: 1fr; }
    .ind-bars { display: none; }
    .score-circle { margin: 0 auto; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>🏢 智慧建築評估 <span>計分工具</span></h1>
    <div class="version-toggle">
      <button class="version-btn active" onclick="switchVersion('2016')">2016版</button>
      <button class="version-btn" onclick="switchVersion('2024')">2024版</button>
    </div>
  </div>
  <div class="type-bar visible" id="typeBar">
    <span class="type-label">建築類別：</span>
    <div class="type-toggle">
      <button class="type-btn active" onclick="switchType('office')">辦公服務類</button>
      <button class="type-btn" onclick="switchType('residential')">住宿類</button>
      <button class="type-btn" onclick="switchType('commercial')">商業類</button>
    </div>
  </div>
</div>

<!-- Score panel -->
<div class="score-panel">
  <div class="score-circle">
    <svg width="100" height="100" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="42" fill="none" stroke="#21262d" stroke-width="8"/>
      <circle id="scoreArc" cx="50" cy="50" r="42" fill="none" stroke="#58a6ff"
        stroke-width="8" stroke-linecap="round"
        stroke-dasharray="264" stroke-dashoffset="264"
        style="transition: stroke-dashoffset 0.5s ease, stroke 0.3s ease"/>
    </svg>
    <div class="score-circle-text">
      <span class="score-num" id="totalScore">0</span>
      <span class="score-max" id="maxScoreLabel">/ 200分</span>
    </div>
  </div>

  <div class="score-info">
    <div class="level-badge level-none" id="levelBadge">🔘 尚未達標</div>
    <div class="next-level" id="nextLevelText">請勾選評估項目以計算總分</div>
    <div id="passNote2016" style="display:none; margin-top:6px; font-size:11px; color:var(--green); opacity:0.8;">
      ✅ 合格級 = 符合所有基本規定（不計鼓勵分數，需另行審查）
    </div>
  </div>

  <div class="ind-bars" id="indBarsPanel"></div>
  <div class="threshold-row" id="thresholdRow"></div>
</div>

<div class="content" id="mainContent"></div>

<script>
// ============================================================
// DATA
// ============================================================

const VERSION_2016 = {
  maxScore: 200,
  levels: [
    { name: '🥉 銅級', min: 50, cls: 'level-copper', tcls: 't-copper', icon: '🥉' },
    { name: '🥈 銀級', min: 90, cls: 'level-silver', tcls: 't-silver', icon: '🥈' },
    { name: '🏆 黃金級', min: 120, cls: 'level-gold', tcls: 't-gold', icon: '🏆' },
    { name: '💎 鑽石級', min: 140, cls: 'level-diamond', tcls: 't-diamond', icon: '💎' },
  ],
  // types: office (辦公服務類), residential (住宿類), commercial (商業類)
  indicators: [
    {
      id: 'ind1', label: '綜合佈線', icon: '🔌', color: 1,
      maxByType: { office: 30, residential: 30, commercial: 30 },
      subcats: [
        {
          id: 's1_1', label: '1.1 佈線規劃與設計', maxByType: { office: 8, residential: 8, commercial: 8 },
          items: [
            { id: 'i1_1_1', label: '佈線規劃完整涵蓋（電信/資訊/控管/宅內/同軸/其他）', note: '1分=3/6涵蓋、2分=5/6涵蓋', type: 'tier', tiers: [0,1,2] },
            { id: 'i1_1_2', label: '佈線相關設備室採高架地板設計', type: 'check', pts: 1 },
            { id: 'i1_1_3', label: '主體佈線採用光纖化架構設計', type: 'check', pts: 1 },
            { id: 'i1_1_4', label: '工作區(10m²)/住宅廳房配置 RJ-45 插座三組以上', note: '1分=30%、2分=60%、3分=100%（WLAN視同一組）', type: 'tier', tiers: [0,1,2,3] },
            { id: 'i1_1_5', label: '水平/工作區佈線系統全數採用同一等級線纜與接續器材', type: 'check', pts: 1 },
          ]
        },
        {
          id: 's1_2', label: '1.2 佈線應用與服務', maxByType: { office: 8, residential: 8, commercial: 8 },
          items: [
            { id: 'i1_2_1', label: '支援進階電信、數位匯流相關服務（VoIP/OTT/視訊等）', type: 'check', pts: 2 },
            { id: 'i1_2_2', label: '支援光纖資通訊相關服務（FTTB/FTTH）', note: '1分=FTTB、2分=FTTH/光纖區域網路', type: 'tier', tiers: [0,1,2] },
            { id: 'i1_2_3', label: '支援建築物控管系統（電力/空調/照明/給排水/通風/電梯/消防）', note: '1分=1/7、2分=5/7涵蓋率', type: 'tier', tiers: [0,1,2] },
            { id: 'i1_2_4', label: '支援智慧服務系統（監視/門禁/保全/對講/停車/求救/家庭自動化）', note: '1分=1/7、2分=4/7涵蓋率', type: 'tier', tiers: [0,1,2] },
          ]
        },
        {
          id: 's1_3', label: '1.3 佈線性能與整合', maxByType: { office: 7, residential: 7, commercial: 7 },
          items: [
            { id: 'i1_3_1', label: '佈線系統等級可達 Cat 6（或同等）以上之標準', type: 'check', pts: 1 },
            { id: 'i1_3_2', label: '配置之佈線可支援傳輸速率', note: '1分=300Mbps、2分=1Gbps、3分=10Gbps', type: 'tier', tiers: [0,1,2,3] },
            { id: 'i1_3_3', label: '電信佈線與資訊佈線（CA/OA）達成整合建置', note: '1分=任一項整合、2分=完整整合', type: 'tier', tiers: [0,1,2] },
            { id: 'i1_3_4', label: '電信/資訊/建築物控管佈線（CA/OA/BA）達成整合建置', type: 'check', pts: 1 },
          ]
        },
        {
          id: 's1_4', label: '1.4 佈線管理與維運', maxByType: { office: 7, residential: 7, commercial: 7 },
          items: [
            { id: 'i1_4_1', label: '應用進階標示與識別（如TIA-606規範、電子條碼等）', note: '1-3分依設計成效', type: 'tier', tiers: [0,1,2,3] },
            { id: 'i1_4_2', label: '具備佈線系統竣工測試報告或測試計畫說明', note: '1分=資訊佈線（含光纖）、2分=悉數各系統', type: 'tier', tiers: [0,1,2] },
            { id: 'i1_4_3', label: '具備維運管理計畫', note: '1分=完整計畫、2分=納入設施管理系統維運', type: 'tier', tiers: [0,1,2] },
          ]
        },
      ]
    },
    {
      id: 'ind2', label: '資訊通信', icon: '📡', color: 2,
      maxByType: { office: 30, residential: 18, commercial: 30 },
      subcats: [
        {
          id: 's2_1', label: '2.1 廣域網路之接取', maxByType: { office: 2, residential: 2, commercial: 2 },
          items: [
            { id: 'i2_1_1', label: '設置微波/衛星裝置或引進第二路由寬頻電路（負載共擔或備援）', type: 'check', pts: 2 },
          ]
        },
        {
          id: 's2_2', label: '2.2 數位式（含IP）電話交換', maxByType: { office: 4, residential: 4, commercial: 4 },
          items: [
            { id: 'i2_2_1', label: '具有雙重處理能力（含控制與電源供應單元）', note: '1分=一項、2分=兩項以上', type: 'tier', tiers: [0,1,2] },
            { id: 'i2_2_2', label: '整合公眾行動通信提供無線分機功能', type: 'check', pts: 2 },
          ]
        },
        {
          id: 's2_3', label: '2.3 區域網路', maxByType: { office: 4, residential: 4, commercial: 4 },
          items: [

// ============================================================
// STATE
// ============================================================
let currentVersion = '2016';
let currentType = 'office'; // office, residential, commercial
const scores = {}; // { itemId: value }
let lastSelectAll = null; // null=none, false=不含加分, true=全加分

function getVersionData() {
  return currentVersion === '2016' ? VERSION_2016 : VERSION_2024;
}

// ============================================================
// RENDER
// ============================================================

function getItemScore(item) {
  const val = scores[item.id] || 0;
  if (item.type === 'check') {
    return val ? item.pts : 0;
  } else if (item.type === 'tier') {
    return Number(val) || 0;
  }
  return 0;
}

function isItemNA(item) {
  if (!item.naTypes) return false;
  return item.naTypes.includes(currentType);
}

function getTiersForItem(item) {
  if (item.tierByType && item.tierByType[currentType]) return item.tierByType[currentType];
  return item.tiers;
}

function calcIndicatorScore(ind) {
  let total = 0;
  for (const sub of ind.subcats) {
    for (const item of sub.items) {
      if (!isItemNA(item)) {
        total += getItemScore(item);
      }
    }
  }
  // Cap at max for current type
  const max = ind.maxByType[currentType] || 0;
  return Math.min(total, max);
}

function calcTotalScore() {
  const data = getVersionData();
  let total = 0;
  for (const ind of data.indicators) {
    total += calcIndicatorScore(ind);
  }
  return total;
}

function getLevel(score) {
  const data = getVersionData();
  let level = null;
  for (const l of data.levels) {
    if (score >= l.min) level = l;
  }
  return level;
}

function getNextLevel(score) {
  const data = getVersionData();
  for (const l of data.levels) {
    if (score < l.min) return l;
  }
  return null;
}

function updateScores() {
  const total = calcTotalScore();
  const data = getVersionData();

  // Update circle
  document.getElementById('totalScore').textContent = total;
  const maxScore = currentVersion === '2016'
    ? data.indicators.reduce((s, ind) => s + (ind.maxByType[currentType] || 0), 0)
    : data.maxScore;
  document.getElementById('maxScoreLabel').textContent = `/ ${maxScore}分`;
  const pct = total / maxScore;
  const circ = 264;
  const arc = document.getElementById('scoreArc');
  arc.style.strokeDashoffset = circ * (1 - pct);

  // Color arc by level
  const level = getLevel(total);
  if (!level) {
    arc.style.stroke = '#8b949e';
  } else if (level.cls.includes('diamond')) arc.style.stroke = '#a5f3fc';
  else if (level.cls.includes('gold')) arc.style.stroke = '#fbbf24';
  else if (level.cls.includes('silver')) arc.style.stroke = '#94a3b8';
  else if (level.cls.includes('copper')) arc.style.stroke = '#b87333';
  else arc.style.stroke = '#3fb950';

  // Level badge
  const badge = document.getElementById('levelBadge');
  const nextLevelEl = document.getElementById('nextLevelText');
  if (!level) {
    badge.className = 'level-badge level-none';
    badge.textContent = '🔘 尚未達銅級';
    const first = data.levels[0];
    nextLevelEl.innerHTML = `距 <span>${first.name}</span> 還需 <span>${first.min - total}</span> 分`;
  } else {
    badge.className = 'level-badge ' + level.cls;
    badge.textContent = level.name;
    const next = getNextLevel(total);
    if (next) {
      nextLevelEl.innerHTML = `距 <span>${next.name}</span> 還需 <span>${next.min - total}</span> 分`;
    } else {
      nextLevelEl.innerHTML = '🎉 已達最高等級 <span>鑽石級</span>！';
    }
  }

  // 2016 合格 prerequisite note
  const passNote = document.getElementById('passNote2016');
  if (passNote) passNote.style.display = currentVersion === '2016' ? 'block' : 'none';

  // Threshold chips
  const row = document.getElementById('thresholdRow');
  row.innerHTML = '';
  for (const l of data.levels) {
    const chip = document.createElement('div');
    chip.className = 'threshold-chip ' + l.tcls + (total >= l.min ? ' reached' : '');
    chip.textContent = `${l.name} ≥${l.min}分`;
    row.appendChild(chip);
  }
  // 2016: append 合格 chip (not score-based)
  if (currentVersion === '2016') {
    const chip = document.createElement('div');
    chip.className = 'threshold-chip t-pass';
    chip.title = '合格級需符合所有基本規定，不計鼓勵分數';
    chip.textContent = '✅ 合格級（基本規定）';
    chip.style.opacity = '0.65';
    row.prepend(chip);
  }

  // Per-indicator bars
  const barsPanel = document.getElementById('indBarsPanel');
  barsPanel.innerHTML = '';
  for (const ind of data.indicators) {
    const indScore = calcIndicatorScore(ind);
    const indMax = ind.maxByType[currentType] || 0;
    const pctInd = indMax > 0 ? (indScore / indMax) : 0;
    const row = document.createElement('div');
    row.className = `ind-bar-row bar-c${ind.color}`;
    row.innerHTML = `
      <span class="ind-bar-label ci${ind.color}">${ind.icon} ${ind.label}</span>
      <div class="ind-bar-track"><div class="ind-bar-fill" style="width:${Math.round(pctInd*100)}%"></div></div>
      <span class="ind-bar-score">${indScore}/${indMax}</span>
    `;
    barsPanel.appendChild(row);
  }

  // Update indicator score badges
  for (const ind of data.indicators) {
    const badge = document.getElementById('badge_' + ind.id);
    if (badge) {
      const s = calcIndicatorScore(ind);
      const m = ind.maxByType[currentType] || 0;
      badge.textContent = `${s} / ${m}分`;
      badge.style.color = s > 0 ? 'var(--green)' : 'var(--text2)';
    }
    // Update subcat scores
    for (const sub of ind.subcats) {
      const subBadge = document.getElementById('badge_' + sub.id);
      if (subBadge) {
        let subScore = 0;
        for (const item of sub.items) {
          if (!isItemNA(item)) subScore += getItemScore(item);
        }
        const subMax = sub.maxByType ? sub.maxByType[currentType] : 0;
        subBadge.innerHTML = `<span class="subcat-score">${subScore}</span>${subMax ? ` / ${subMax}分` : ''}`;
      }
    }
  }
}

function renderContent() {
  const data = getVersionData();
  const container = document.getElementById('mainContent');
  container.innerHTML = '';

  // Toolbar
  const toolbar = document.createElement('div');
  toolbar.className = 'toolbar';
  toolbar.innerHTML = `
    <button class="select-all-btn" onclick="selectAll(false)">☑ 全勾選（不含加分）</button>
    <button class="select-all-btn" onclick="selectAll(true)">☑ 全勾選（全加分）</button>
    <button class="reset-btn" onclick="resetAll()">🔄 清除全部</button>
  `;
  // restore active state after re-render
  const btns = toolbar.querySelectorAll('.select-all-btn');
  if (lastSelectAll === false) btns[0].classList.add('active');
  else if (lastSelectAll === true) btns[1].classList.add('active');
  container.appendChild(toolbar);

  for (const ind of data.indicators) {
    const card = document.createElement('div');
    card.className = 'indicator-card';
    card.id = 'card_' + ind.id;

    // Header
    const header = document.createElement('div');
    header.className = 'indicator-header';
    header.innerHTML = `
      <div class="ind-icon c${ind.color}">${ind.icon}</div>
      <div style="flex:1">
        <div class="ind-title ci${ind.color}">${ind.label}</div>
        <div class="ind-sub">${getIndicatorSub(ind)}</div>
      </div>
      <div class="ind-score-badge" id="badge_${ind.id}">0 / ${ind.maxByType[currentType]}分</div>
      <div class="chevron" id="chev_${ind.id}">▶</div>
    `;
    header.onclick = () => toggleIndicator(ind.id);
    card.appendChild(header);

    // Body
    const body = document.createElement('div');
    body.className = 'indicator-body';
    body.id = 'body_' + ind.id;

    for (const sub of ind.subcats) {
      const subEl = document.createElement('div');
      subEl.className = 'subcat';

      const subHeader = document.createElement('div');
      subHeader.className = 'subcat-header';
      subHeader.innerHTML = `
        <span>${sub.label}</span>
        <span id="badge_${sub.id}">${sub.maxByType ? `0 / ${sub.maxByType[currentType]}分` : ''}</span>
      `;
      subEl.appendChild(subHeader);

      for (const item of sub.items) {
        subEl.appendChild(renderItem(item));
      }

      body.appendChild(subEl);
    }

    card.appendChild(body);
    container.appendChild(card);
  }

  updateScores();
}

function getIndicatorSub(ind) {
  const data = getVersionData();
  let count = 0;
  for (const sub of ind.subcats) count += sub.items.length;
  return `${count} 個評估項目 · 最高 ${ind.maxByType[currentType]} 分`;
}

function renderItem(item) {
  const el = document.createElement('div');
  el.className = 'score-item';
  el.id = 'row_' + item.id;

  const isNA = isItemNA(item);
  const val = scores[item.id] || 0;
  const curScore = getItemScore(item);

  let controlHtml = '';
  let ptsText = '';

  if (item.type === 'check') {
    const pts = item.pts || 0;
    controlHtml = `<input type="checkbox" id="chk_${item.id}" ${val ? 'checked' : ''} ${isNA ? 'disabled' : ''} onchange="onCheck('${item.id}', this.checked, ${pts})">`;
    ptsText = `+${pts}分`;
  } else if (item.type === 'tier') {
    const tiers = getTiersForItem(item);
    let btns = '';
    for (const t of tiers) {
      const selected = Number(val) === Number(t);
      btns += `<button class="tier-btn${selected?' selected':''}${t===0?' tier-0':''}" ${isNA?'disabled':''} onclick="onTier('${item.id}', ${t})">${t === 0 ? '不選' : `+${t}分`}</button>`;
    }
    controlHtml = `<div class="tier-group">${btns}</div>`;
    ptsText = curScore > 0 ? `+${curScore}分` : `0分`;
  }

  el.innerHTML = `
    <div class="item-controls">${controlHtml}</div>
    <div class="item-content">
      <div class="item-label${isNA ? ' na' : ''}" style="${isNA ? 'color:var(--text3)' : ''}">${item.label}${isNA ? '<span class="na-chip">不適用</span>' : ''}</div>
      ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
    </div>
    <div class="item-pts${curScore > 0 ? ' active' : ''}" id="pts_${item.id}">${ptsText}</div>
  `;

  return el;
}

function refreshItem(item) {
  const row = document.getElementById('row_' + item.id);
  if (!row) return;
  const val = scores[item.id] || 0;
  const curScore = getItemScore(item);
  const isNA = isItemNA(item);

  if (item.type === 'check') {
    const chk = document.getElementById('chk_' + item.id);
    if (chk) chk.checked = !!val;
    const ptsEl = document.getElementById('pts_' + item.id);
    if (ptsEl) {
      ptsEl.textContent = `+${item.pts}分`;
      ptsEl.className = 'item-pts' + (curScore > 0 ? ' active' : '');
    }
  } else {
    // Re-render tier buttons
    const tiers = getTiersForItem(item);
    const group = row.querySelector('.tier-group');
    if (group) {
      group.innerHTML = '';
      for (const t of tiers) {
        const btn = document.createElement('button');
        btn.className = 'tier-btn' + (Number(val) === Number(t) ? ' selected' : '') + (t === 0 ? ' tier-0' : '');
        btn.textContent = t === 0 ? '不選' : `+${t}分`;
        if (isNA) btn.disabled = true;
        btn.onclick = () => onTier(item.id, t);
        group.appendChild(btn);
      }
    }
    const ptsEl = document.getElementById('pts_' + item.id);
    if (ptsEl) {
      ptsEl.textContent = curScore > 0 ? `+${curScore}分` : '0分';
      ptsEl.className = 'item-pts' + (curScore > 0 ? ' active' : '');
    }
  }
}

function onCheck(itemId, checked, pts) {
  scores[itemId] = checked ? pts : 0;
  const ptsEl = document.getElementById('pts_' + itemId);
  if (ptsEl) {
    ptsEl.className = 'item-pts' + (checked ? ' active' : '');
  }
  updateScores();
}

function onTier(itemId, value) {
  scores[itemId] = Number(value);
  // Re-render buttons
  const data = getVersionData();
  for (const ind of data.indicators) {
    for (const sub of ind.subcats) {
      for (const item of sub.items) {
        if (item.id === itemId) {
          refreshItem(item);
          break;
        }
      }
    }
  }
  updateScores();
}

function toggleIndicator(indId) {
  const body = document.getElementById('body_' + indId);
  const chev = document.getElementById('chev_' + indId);
  if (body.classList.contains('open')) {
    body.classList.remove('open');
    chev.classList.remove('open');
  } else {
    body.classList.add('open');
    chev.classList.add('open');
  }
}

function switchVersion(ver) {
  currentVersion = ver;
  lastSelectAll = null;
  document.querySelectorAll('.version-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === ver + '版');
  });
  const typeBar = document.getElementById('typeBar');
  typeBar.classList.toggle('visible', ver === '2016');
  renderContent();
}

function switchType(type) {
  currentType = type;
  lastSelectAll = null;
  for (const k in scores) delete scores[k];
  document.querySelectorAll('.type-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('onclick').includes(type));
  });
  renderContent();
}

function resetAll() {
  lastSelectAll = null;
  for (const k in scores) delete scores[k];
  renderContent();
}

function selectAll(includeMaxTier) {
  lastSelectAll = includeMaxTier;
  for (const k in scores) delete scores[k]; // 每次先全清，確保切換時分數準確
  const data = getVersionData();
  for (const ind of data.indicators) {
    for (const sub of ind.subcats) {
      for (const item of sub.items) {
        if (item.naTypes && item.naTypes.includes(currentType)) continue;
        if (item.type === 'check') {
          scores[item.id] = item.pts;
        } else if (item.type === 'tier' && includeMaxTier) {
          const tiers = item.tierByType ? (item.tierByType[currentType] || item.tiers) : item.tiers;
          scores[item.id] = tiers[tiers.length - 1];
        }
      }
    }
  }
  renderContent();
}

// Init
renderContent();

// Set --header-height so score-panel sticks right below the header
function updateHeaderHeight() {
  const h = document.querySelector('.header');
  if (h) document.documentElement.style.setProperty('--header-height', h.offsetHeight + 'px');
}
updateHeaderHeight();
window.addEventListener('resize', updateHeaderHeight);
</script>
</body>
